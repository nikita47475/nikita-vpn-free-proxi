<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мой IP</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#1e1e2f,#2b5876);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 25px;
  border-radius: 16px;
  width: 320px;
  text-align: center;
  backdrop-filter: blur(10px);
  position: relative;
}

h2 { margin-bottom: 10px; }

#ip {
  font-size: 26px;
  color: #00ffcc;
  margin: 15px 0;
  word-break: break-all;
}

button {
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #00ffcc;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover { transform: scale(1.05); }

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.toast {
  margin-top: 10px;
  font-size: 13px;
  opacity: 0;
  transition: 0.3s;
}
.toast.show { opacity: 1; }

.loader {
  position: absolute;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.4);
  border-radius: 16px;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid rgba(255,255,255,0.3);
  border-top: 4px solid #00ffcc;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="card">

<h2>Твой IP</h2>
<div id="ip">Загрузка...</div>

<button id="btnUpdate" onclick="updateIP()">Обновить</button>
<button onclick="copyIP()">Копировать</button>
<button onclick="publishIP()">Опубликовать</button>

<div id="toast" class="toast"></div>

<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

</div>

<script>

let currentIP = "";

async function getIP() {
  try {
    const res = await fetch("https://api.ipify.org?format=json");
    const data = await res.json();
    currentIP = data.ip;
    document.getElementById("ip").textContent = currentIP;
  } catch (e) {
    currentIP = "";
    document.getElementById("ip").textContent = "Ошибка загрузки";
  }
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1500);
}

async function copyIP() {
  try {
    if (!currentIP) throw new Error("no ip");

    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(currentIP);
    } else {
      const ta = document.createElement("textarea");
      ta.value = currentIP;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }

    toast("Скопировано");
  } catch (e) {
    toast("Ошибка копирования");
  }
}

function publishIP() {
  try {
    if (!currentIP) throw new Error("no ip");

    let db = JSON.parse(localStorage.getItem("db") || "[]");

    db.push({
      ip: currentIP,
      device: navigator.userAgent,
      time: new Date().toLocaleString()
    });

    localStorage.setItem("db", JSON.stringify(db));

    toast("Опубликовано");
  } catch (e) {
    console.error(e);
    toast("Ошибка публикации");
  }
}

async function updateIP() {
  const loader = document.getElementById("loader");
  const btn = document.getElementById("btnUpdate");

  loader.style.display = "flex";
  btn.disabled = true;

  await getIP();

  setTimeout(() => {
    loader.style.display = "none";
    btn.disabled = false;

    if (currentIP) toast("IP обновлён");
    else toast("Ошибка обновления");
  }, 500);
}

getIP();

</script>

</body>
</html>
